<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quill VR — Constellation immersive</title>
<style>
  :root{
    --bg:#f5f4f0; --surface:#ffffff; --surface2:#eeecea; --text:#1a1917;
    --muted:#8a8884; --border:#e4e2de; --accent:#c96442;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1a1917; --surface:#242220; --surface2:#2e2c2a; --text:#f0eeea;
           --muted:#6b6965; --border:#3a3836; --accent:#d4785a; }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif;overflow:hidden;
    -webkit-tap-highlight-color:transparent}
  #stage{position:fixed;inset:0;touch-action:none}
  canvas{display:block;width:100%;height:100%}

  header{position:fixed;top:0;left:0;right:0;z-index:20;background:var(--surface);
    border-bottom:0.5px solid var(--border);padding:11px 20px;display:flex;
    align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:1.15rem;font-weight:400;letter-spacing:-0.01em;margin:0}
  header h1 span{color:var(--accent)}
  .hsub{font-size:0.74rem;color:var(--muted)}
  .spacer{flex:1}
  .ctrls{display:flex;gap:6px;flex-wrap:wrap}
  .pill{cursor:pointer;color:var(--muted);font-size:0.72rem;font-weight:400;
    padding:3px 10px;border-radius:6px;border:0.5px solid var(--border);
    background:var(--surface);transition:all .15s;white-space:nowrap;text-decoration:none}
  .pill:hover{color:var(--text);border-color:var(--muted)}
  .pill.on{color:var(--accent);border-color:var(--accent)}
  .pill.mode{color:var(--text);border-color:var(--accent);font-weight:500}

  .legend{position:fixed;left:20px;bottom:18px;z-index:15;display:flex;flex-wrap:wrap;
    gap:2px 4px;max-width:min(92vw,560px);font-size:0.7rem;color:var(--muted);
    background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:7px 9px}
  .legend .cap{width:100%;font-size:0.64rem;color:var(--muted);margin-bottom:2px}
  .legend .yr{display:inline-flex;align-items:center;gap:5px;cursor:pointer;
    padding:2px 6px;border-radius:6px;transition:.12s}
  .legend .yr:hover{background:var(--surface2)}
  .legend .yr.dim{opacity:.3}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}

  .hint{position:fixed;right:20px;bottom:18px;z-index:15;font-size:0.68rem;color:var(--muted);
    text-align:right;line-height:1.55;pointer-events:none;max-width:42vw}

  .tip{position:fixed;z-index:25;pointer-events:none;transform:translate(-50%,calc(-100% - 14px));
    background:var(--surface);border:0.5px solid var(--border);border-radius:10px;
    padding:7px 10px;font-size:0.72rem;max-width:240px;opacity:0;transition:opacity .12s;
    box-shadow:0 10px 34px rgba(0,0,0,.16)}
  .tip b{color:var(--text);font-weight:500}
  .tip .m{color:var(--muted);font-size:0.66rem;margin-top:3px}

  .panel{position:fixed;inset:0;z-index:40;display:none;opacity:0;transition:opacity .35s;
    background:rgba(26,25,23,.55);backdrop-filter:blur(10px)}
  .panel.show{display:block;opacity:1}
  .sheet{position:absolute;inset:0;display:grid;grid-template-rows:auto 1fr auto;
    max-width:1180px;margin:0 auto}
  .sheet header{position:static;border:none;background:transparent;display:flex;
    align-items:flex-start;gap:1rem;padding:1.1rem 1.3rem .5rem}
  .sheet .meta h2{margin:0;font-size:1.05rem;font-weight:500;letter-spacing:.03em;color:#fff}
  .sheet .meta .d{color:rgba(255,255,255,.7);font-size:.78rem;margin-top:.25rem}
  .sheet .meta .tags{color:#f0b59f;font-size:.72rem;margin-top:.4rem;line-height:1.5;max-width:62ch}
  .close{margin-left:auto;cursor:pointer;border:0.5px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.08);color:#fff;border-radius:50%;width:36px;height:36px;
    font-size:1.1rem;flex:none}
  .close:hover{border-color:var(--accent)}

  .stagewrap{position:relative;display:flex;align-items:center;justify-content:center;padding:0 1.3rem;overflow:hidden}
  .hero{position:relative;max-width:100%;max-height:100%;display:flex;align-items:center;justify-content:center}
  .hero img,.hero iframe{max-width:100%;max-height:62vh;border-radius:14px;border:0.5px solid rgba(255,255,255,.15);
    background:var(--surface2);box-shadow:0 26px 70px rgba(0,0,0,.5);opacity:0;
    transition:opacity .4s,transform .4s;transform:scale(.96)}
  .hero img.in,.hero iframe.in{opacity:1;transform:scale(1)}
  .navbtn{position:absolute;top:50%;transform:translateY(-50%);z-index:3;cursor:pointer;
    border:0.5px solid rgba(255,255,255,.25);background:rgba(26,25,23,.55);color:#fff;
    width:42px;height:42px;border-radius:50%;font-size:1.2rem}
  .navbtn:hover{border-color:var(--accent)}
  .navbtn.prev{left:.4rem}.navbtn.next{right:.4rem}
  .counter{position:absolute;bottom:.4rem;left:50%;transform:translateX(-50%);font-size:.7rem;
    color:rgba(255,255,255,.8);background:rgba(26,25,23,.55);padding:.2rem .6rem;border-radius:999px}

  .bottom{padding:.7rem 1.3rem 1rem}
  .bottom .lab{font-size:.68rem;color:rgba(255,255,255,.6);text-transform:uppercase;
    letter-spacing:.09em;margin-bottom:.5rem}
  .strip{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.3rem;scrollbar-width:thin}
  .strip .th{flex:none;width:74px;height:74px;border-radius:50%;border:0.5px solid rgba(255,255,255,.18);
    overflow:hidden;cursor:pointer;position:relative;background:var(--surface2);transition:.15s}
  .strip .th:hover{border-color:var(--accent);transform:translateY(-2px)}
  .strip .th img{width:100%;height:100%;object-fit:cover;display:block}
  .strip .th .yb{position:absolute;left:50%;bottom:5px;transform:translateX(-50%);font-size:.58rem;
    background:rgba(0,0,0,.55);color:#fff;padding:1px 6px;border-radius:6px}
  .strip .th .lk{position:absolute;right:6px;top:6px;width:8px;height:8px;border-radius:50%}

  .loader{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:1rem;background:var(--bg);transition:opacity .5s}
  .loader.hide{opacity:0;pointer-events:none}
  .loader .ring{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader p{color:var(--muted);font-size:.8rem}
  @media (max-width:640px){
    header{padding:9px 14px}.hsub{display:none}.hint{display:none}
    .hero img,.hero iframe{max-height:52vh}.legend{max-width:88vw}
  }
</style>
</head>

  return `hsl(${h.toFixed(0)} ${s}% ${l}%)`;
}
let COLORS={}; function buildColors(){ COLORS={}; YEARS.forEach(y=>COLORS[y]=yearColor(y));
  NODES.forEach(n=>n.col=COLORS[n.year]); }
function linkRGBA(a){ return DARK?`rgba(150,140,128,${a})`:`rgba(90,80,70,${a})`; }
const ACCENT = ()=>getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#c96442';
matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change',e=>{DARK=e.matches;buildColors();applyMode(MODE);});

const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){ W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

const cam={x:0,y:0,scale:1,tx:0,ty:0,ts:1};
function baseScale(){ return Math.min(W,H)*0.46; }

NODES.forEach(n=>{ n.px=n.x;n.py=n.y;n.vx=0;n.vy=0;
  n.r=2.4+Math.min(6,Math.sqrt(n.n||1)*1.1); });
buildColors();

// ---- mode-aware structures (proxy = all 495 ; geom = analyzed subset) ----
const PROXY_EDGES = LINKS.map(([a,b,w])=>[NODES[a],NODES[b],w]);
const GIDS = DATA.gids||[];
const byGid = {}; NODES.forEach(n=>{ if(n.g) byGid[n.id]=n; });
const GEOM_NODES = NODES.filter(n=>n.g);
const GEOM_EDGES = (DATA.glinks||[]).map(([a,b])=>[byGid[GIDS[a]],byGid[GIDS[b]],0.6]).filter(e=>e[0]&&e[1]);
const GEOM_N = GEOM_NODES.length;

let MODE='proxy', ACTIVE=NODES, EDGES=PROXY_EDGES;
function applyMode(m){
  MODE=m;
  if(m==='geom'){ ACTIVE=GEOM_NODES; EDGES=GEOM_EDGES;
    ACTIVE.forEach(n=>{ n.ox=n.gx; n.oy=n.gy; n.curCol=n.gcol||n.col; });
  } else { ACTIVE=NODES; EDGES=PROXY_EDGES;
    NODES.forEach(n=>{ n.ox=n.x; n.oy=n.y; n.curCol=n.col; });
  }
  // ox,oy = disposition d'origine ; bx,by = état de repos courant (évolutif)
  ACTIVE.forEach(n=>{ n.bx=n.ox; n.by=n.oy; n.px=n.ox; n.py=n.oy; n.vx=0; n.vy=0; });
  prevH=null; computeOrig();
  NODES.forEach(n=>n.adj=[]);
  EDGES.forEach(([A,B])=>{ A.adj.push(B); B.adj.push(A); });
  hoverNode=null;
  document.getElementById('bMode').textContent = m==='geom'?`Critère : géométrie (${GEOM_N})`:'Critère : chronologie';
  document.getElementById('sub').textContent = m==='geom'
    ? `${GEOM_N} œuvres placées par forme · couleur = couleur dominante réelle`
    : `${NODES.length} œuvres dans le temps · gauche→droite : 2017→${YEARS[YEARS.length-1]}`;
  renderLegendCaption();
  resetView();
}

let mouse={x:-1e4,y:-1e4,inside:false,wx:0,wy:0};
let hoverNode=null,prevH=null,dragging=false,lastX=0,lastY=0,moved=0;
let yearFilter=new Set(YEARS), showLinks=true, showThumbs=true;
let ORIGC=[0,0], ORIGR=1;
function computeOrig(){ const L=ACTIVE.length||1; let cx=0,cy=0;
  for(const n of ACTIVE){cx+=n.ox;cy+=n.oy;} cx/=L;cy/=L;
  let r=0; for(const n of ACTIVE){const dx=n.ox-cx,dy=n.oy-cy;r+=dx*dx+dy*dy;}
  ORIGC=[cx,cy]; ORIGR=Math.sqrt(r/L)||1; }

function worldToScreen(wx,wy){ const s=baseScale()*cam.scale; return [W/2+(wx-cam.x)*s, H/2+(wy-cam.y)*s]; }
function screenToWorld(sx,sy){ const s=baseScale()*cam.scale; return [(sx-W/2)/s+cam.x,(sy-H/2)/s+cam.y]; }

const imgCache=new Map();
function getThumb(id){ if(imgCache.has(id))return imgCache.get(id);
  const im=new Image(); im.decoding='async'; im.src=THUMB(id,300);
  const rec={im,ok:false}; im.onload=()=>rec.ok=true; im.onerror=()=>rec.err=true;
  imgCache.set(id,rec); return rec; }

function step(){
  cam.x+=(cam.tx-cam.x)*0.12; cam.y+=(cam.ty-cam.y)*0.12; cam.scale+=(cam.ts-cam.scale)*0.12;
  if(mouse.inside){ const [wx,wy]=screenToWorld(mouse.x,mouse.y); mouse.wx=wx; mouse.wy=wy; }
  const H=(mouse.inside&&hoverNode)?hoverNode:null;
  // fin de consultation : on FIGE l'état courant comme nouvel état de repos (pas de retour à l'initial)
  if(prevH&&!H){ for(const n of ACTIVE){ n.bx=n.px; n.by=n.py; } }
  prevH=H;
  // rappel doux vers l'état de repos courant
  const SPRING=0.016;
  for(const n of ACTIVE){ if(n===H)continue; n.vx+=(n.bx-n.px)*SPRING; n.vy+=(n.by-n.py)*SPRING; }
  // survol : voisins reliés aspirés vers H ; non-reliés repoussés hors de H (reconfiguration)
  if(H){
    const hx=H.px, hy=H.py, neigh=new Set(H.adj);
    const RAD=0.7, RAD2=RAD*RAD;
    for(const n of ACTIVE){ if(n===H)continue;
      const dx=n.px-hx, dy=n.py-hy, d2=dx*dx+dy*dy+1e-6;
      if(neigh.has(n)){ n.vx-=dx*0.012; n.vy-=dy*0.012; }
      else if(d2<RAD2){ const f=0.00016*(1-Math.sqrt(d2)/RAD)/(d2+0.004);
        n.vx+=dx*f; n.vy+=dy*f; } }
  }
  // cohésion légère le long des liens
  for(const [A,B] of EDGES){ const dx=B.px-A.px,dy=B.py-A.py;
    A.vx+=dx*0.0005;A.vy+=dy*0.0005;B.vx-=dx*0.0005;B.vy-=dy*0.0005; }
  // anti-chevauchement courte portée
  const AR=ACTIVE, L=AR.length, RR=0.035, RR2=RR*RR;
  for(let i=0;i<L;i++){ const a=AR[i]; if(a===H)continue;
    for(let j=i+1;j<L;j++){ const b=AR[j]; if(b===H)continue;
      const dx=a.px-b.px, dy=a.py-b.py, d2=dx*dx+dy*dy;
      if(d2<RR2&&d2>1e-9){ const f=0.00006*(1-Math.sqrt(d2)/RR)/(d2+0.0004);
        const fx=dx*f, fy=dy*f; a.vx+=fx;a.vy+=fy; b.vx-=fx;b.vy-=fy; } } }
  // intégration + amortissement
  for(const n of AR){ if(n===H)continue; n.vx*=0.9; n.vy*=0.9; n.px+=n.vx; n.py+=n.vy; }
  // anti-recroquevillement : maintien doux de l'échelle et du centre (atténué pendant le survol)
  let cx=0,cy=0; for(const n of AR){cx+=n.px;cy+=n.py;} cx/=L;cy/=L;
  let rr=0; for(const n of AR){const dx=n.px-cx,dy=n.py-cy;rr+=dx*dx+dy*dy;} rr=Math.sqrt(rr/L)||1;
  const ke=H?0.02:0.06, sc=1+(ORIGR/rr-1)*ke, tx=(ORIGC[0]-cx)*ke, ty=(ORIGC[1]-cy)*ke;
  for(const n of AR){ if(n===H)continue; n.px=(n.px-cx)*sc+cx+tx; n.py=(n.py-cy)*sc+cy+ty;
    n.bx=(n.bx-cx)*sc+cx+tx; n.by=(n.by-cy)*sc+cy+ty; }
  // le nœud survolé se fige sur place (stable, cliquable) sans coller au pointeur
  if(H){ H.vx=0; H.vy=0; H.bx=H.px; H.by=H.py; }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const dim=v=>yearFilter.has(v.year)?1:0.08;
  if(showLinks){
    ctx.lineWidth=Math.max(.4,0.55*cam.scale);
    for(const [A,B,w] of EDGES){ const op=Math.min(dim(A),dim(B)); if(op<0.1)continue;
      const al=(0.07+w*0.22)*op;
      const [ax,ay]=worldToScreen(A.px,A.py),[bx,by]=worldToScreen(B.px,B.py);
      ctx.strokeStyle=linkRGBA(al.toFixed(3));
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
    }
  }
  const showImg=showThumbs&&cam.scale>1.7, acc=ACCENT();
  for(const n of ACTIVE){
    const op=dim(n);
    const [x,y]=worldToScreen(n.px,n.py);
    if(x<-40||x>W+40||y<-40||y>H+40)continue;
    const isH=n===hoverNode;
    const rad=(isH?n.r*1.7:n.r)*Math.max(1,Math.min(2.4,cam.scale*0.7));
    const wantImg=isH||(showImg&&rad>9);
    if(wantImg){
      const rec=getThumb(n.cover);
      if(rec.ok){
        const Rr=Math.max(rad,isH?26:rad);
        ctx.save();ctx.globalAlpha=op;
        ctx.beginPath();ctx.arc(x,y,Rr,0,7);ctx.closePath();ctx.clip();
        const im=rec.im; let sw=im.width,sh=im.height,sx=0,sy=0;
        if(sw>sh){sx=(sw-sh)/2;sw=sh;}else{sy=(sh-sw)/2;sh=sw;}
        ctx.drawImage(im,sx,sy,sw,sh,x-Rr,y-Rr,2*Rr,2*Rr);
        ctx.restore();
        ctx.lineWidth=isH?2.4:1; ctx.strokeStyle=isH?acc:n.curCol; ctx.globalAlpha=op;
        ctx.beginPath();ctx.arc(x,y,Rr,0,7);ctx.stroke(); ctx.globalAlpha=1; continue;
      }
    }
    ctx.globalAlpha=op; ctx.fillStyle=n.curCol;
    if(isH){ctx.shadowColor=acc;ctx.shadowBlur=16;}
    ctx.beginPath();ctx.arc(x,y,rad,0,7);ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    if(isH){ctx.lineWidth=2;ctx.strokeStyle=acc;ctx.beginPath();ctx.arc(x,y,rad+3,0,7);ctx.stroke();}
  }
}
function loop(){ step(); draw(); requestAnimationFrame(loop); }

function pickNode(sx,sy){ let best=null,bd=18*18;
  for(const n of ACTIVE){ if(!yearFilter.has(n.year))continue;
    const [x,y]=worldToScreen(n.px,n.py); const dx=x-sx,dy=y-sy,d=dx*dx+dy*dy;
    if(d<bd){bd=d;best=n;} } return best; }
const tip=document.getElementById('tip');
function updateTip(){
  if(!hoverNode){tip.style.opacity=0;cv.style.cursor=dragging?'grabbing':'grab';return;}
  const n=hoverNode,[x,y]=worldToScreen(n.px,n.py);
  tip.style.left=x+'px'; tip.style.top=y+'px';
  tip.innerHTML=`<b>${n.year}</b> · ${n.n} image${n.n>1?'s':''}`+
    (n.tags?`<div class="m">${n.tags.split(' ').slice(0,6).map(t=>'#'+t).join(' ')}</div>`:'');
  tip.style.opacity=1;cv.style.cursor='pointer';
}

cv.addEventListener('pointerdown',e=>{dragging=true;moved=0;lastX=e.clientX;lastY=e.clientY;cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{
  mouse.x=e.clientX;mouse.y=e.clientY;mouse.inside=true;
  if(dragging){ const dx=e.clientX-lastX,dy=e.clientY-lastY;moved+=Math.abs(dx)+Math.abs(dy);
    const s=baseScale()*cam.scale; cam.tx-=dx/s;cam.ty-=dy/s;cam.x=cam.tx;cam.y=cam.ty;
    lastX=e.clientX;lastY=e.clientY;
  } else {
    let pick=pickNode(e.clientX,e.clientY);
    if(hoverNode&&pick!==hoverNode){ const [hx,hy]=worldToScreen(hoverNode.px,hoverNode.py);
      if((hx-e.clientX)**2+(hy-e.clientY)**2 < 20*20) pick=hoverNode; }
    hoverNode=pick; updateTip();
  }
});
cv.addEventListener('pointerup',e=>{ dragging=false;
  if(moved<6){ const n=pickNode(e.clientX,e.clientY); if(n)openProject(n); } });
cv.addEventListener('pointerleave',()=>{mouse.inside=false;hoverNode=null;updateTip();});
cv.addEventListener('wheel',e=>{ e.preventDefault();
  const [wx,wy]=screenToWorld(e.clientX,e.clientY);
  cam.ts=Math.max(0.5,Math.min(9,cam.ts*Math.exp(-e.deltaY*0.0014))); cam.scale=cam.ts;
  const s=baseScale()*cam.scale; cam.tx=wx-(e.clientX-W/2)/s; cam.ty=wy-(e.clientY-H/2)/s; cam.x=cam.tx;cam.y=cam.ty;
},{passive:false});
let pinch=null;
cv.addEventListener('touchstart',e=>{if(e.touches.length===2)pinch={d:tdist(e),s:cam.scale};},{passive:false});
cv.addEventListener('touchmove',e=>{if(e.touches.length===2&&pinch){e.preventDefault();
  cam.ts=Math.max(0.5,Math.min(9,pinch.s*tdist(e)/pinch.d));cam.scale=cam.ts;}},{passive:false});
cv.addEventListener('touchend',()=>{pinch=null;});
function tdist(e){const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}

function focusNode(n,scale){cam.tx=n.bx;cam.ty=n.by;cam.ts=scale||3.2;}
function resetView(){cam.tx=0;cam.ty=0;cam.ts=1;}
document.getElementById('bReset').onclick=()=>{ ACTIVE.forEach(n=>{ n.bx=n.ox; n.by=n.oy; }); prevH=null; resetView(); };
document.getElementById('bLinks').onclick=e=>{showLinks=!showLinks;e.target.classList.toggle('on',showLinks);};
document.getElementById('bThumbs').onclick=e=>{showThumbs=!showThumbs;e.target.classList.toggle('on',showThumbs);};
document.getElementById('bMode').onclick=()=>{ if(GEOM_N) applyMode(MODE==='geom'?'proxy':'geom'); };

const panel=document.getElementById('panel');
let cur={node:null,idx:0};
function openProject(n){
  cur.node=n; cur.idx=Math.max(0,n.imgs.indexOf(n.cover));
  focusNode(n,3.4);
  document.getElementById('pTitle').textContent=n.id.replace('VR-','');
  document.getElementById('pDate').textContent=
    `${n.year} · ${n.imgs.length} image${n.imgs.length>1?'s':''}`+(n.nb_posts>1?` · agrégat de ${n.nb_posts} posts`:'');
  document.getElementById('pTags').textContent=n.tags?('#'+n.tags.split(' ').join(' #')):'';
  const rel=document.getElementById('pRel'); const neigh=[...new Set(n.adj)].slice(0,18);
  document.getElementById('pRelLab').textContent=neigh.length
    ?`Œuvres reliées (${neigh.length}) — ${MODE==='geom'?'par forme':'par affinité'}`:'Aucune œuvre reliée';
  rel.innerHTML='';
  neigh.forEach(m=>{ const th=document.createElement('div'); th.className='th';
    th.innerHTML=`<img loading="lazy" src="${THUMB(m.cover,300)}" alt="">`+
      `<span class="yb">${m.year}</span><span class="lk" style="background:${m.curCol||m.col}"></span>`;
    th.onclick=()=>openProject(m); rel.appendChild(th); });
  renderHero(); panel.classList.add('show');
}
function renderHero(){
  const n=cur.node,id=n.imgs[cur.idx],isVid=n.vid[cur.idx];
  const hero=document.getElementById('pHero'); hero.innerHTML=''; let el;
  if(isVid){el=document.createElement('iframe');el.src=PREVIEW(id);el.allow='autoplay';el.className='in';}
  else{el=document.createElement('img');el.src=THUMB(id,1600);el.onload=()=>el.classList.add('in');}
  hero.appendChild(el);
  document.getElementById('pCount').textContent=`${cur.idx+1} / ${n.imgs.length}`;
}
function nav(d){const n=cur.node;cur.idx=(cur.idx+d+n.imgs.length)%n.imgs.length;renderHero();}
document.getElementById('pPrev').onclick=()=>nav(-1);
document.getElementById('pNext').onclick=()=>nav(1);
document.getElementById('pClose').onclick=closeProject;
function closeProject(){panel.classList.remove('show');resetView();}
addEventListener('keydown',e=>{ if(!panel.classList.contains('show'))return;
  if(e.key==='Escape')closeProject(); if(e.key==='ArrowRight')nav(1); if(e.key==='ArrowLeft')nav(-1); });

const legend=document.getElementById('legend');
function renderLegendCaption(){
  let cap=legend.querySelector('.cap');
  if(!cap){cap=document.createElement('span');cap.className='cap';legend.prepend(cap);}
  cap.textContent = MODE==='geom' ? 'couleur = couleur dominante · filtre par année :' : 'couleur = année :';
}
YEARS.forEach(y=>{ const el=document.createElement('span'); el.className='yr';
  el.innerHTML=`<i class="dot" style="background:${COLORS[y]}"></i>${y}`;
  el.onclick=()=>{
    if(yearFilter.has(y)){ if(yearFilter.size===YEARS.length)yearFilter=new Set([y]); else yearFilter.delete(y); }
    else yearFilter.add(y);
    if(yearFilter.size===0)yearFilter=new Set(YEARS);
    [...legend.querySelectorAll('.yr')].forEach((c,k)=>c.classList.toggle('dim',!yearFilter.has(YEARS[k])));
  };
  legend.appendChild(el); });

applyMode('proxy');
loop();
setTimeout(()=>document.getElementById('loader').classList.add('hide'),650);
</script>
</body>
</html>
