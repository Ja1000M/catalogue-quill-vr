<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Réseau d'espaces — Quill VR</title>
<style>
  :root{--bg:#f5f4f0;--text:#1a1917;--muted:#8a8884;--border:#e4e2de;--accent:#c96442}
  @media (prefers-color-scheme:dark){:root{--bg:#1a1917;--text:#f0eeea;--muted:#6b6965;--border:#3a3836;--accent:#d4785a}}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif;overflow:hidden}
  #app{position:fixed;inset:0}
  #app canvas{display:block;cursor:grab}
  header{position:fixed;top:0;left:0;right:0;z-index:5;padding:18px 26px;display:flex;
    align-items:baseline;gap:16px;flex-wrap:wrap;pointer-events:none}
  h1{margin:0;font-weight:300;font-size:1.5rem} h1 span{color:var(--accent)}
  .sub{color:var(--muted);font-size:.78rem;letter-spacing:.05em}
  .back{margin-left:auto;pointer-events:auto;color:var(--muted);text-decoration:none;
    font-size:.78rem;border:0.5px solid var(--border);padding:5px 12px;border-radius:999px}
  .back:hover{color:var(--accent);border-color:var(--accent)}
  .hint{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:var(--muted);
    font-size:.72rem;pointer-events:none}
</style>
</head>
<body>
<header>
  <h1>Réseau d'<span>espaces</span></h1>
  <span class="sub">30 espaces immersifs · Emerging Realms — structure sphérique, parcours 3D</span>
  <a class="back" href="index.html">← Accueil</a>
</header>
<div id="app"></div>
<div class="hint">Faites glisser pour tourner le réseau · cliquez un cube pour explorer l'espace ↗</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  if(!window.THREE){ document.getElementById('app').innerHTML='<p style="padding:40px;color:#888">Three.js n\'a pas pu se charger.</p>'; return; }
  var isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  var COL = { line:isDark?0xb8aea4:0x6e645c, lineCss:isDark?'#b8aea4':'#6e645c', accent:isDark?0xd4785a:0xc96442 };
  var N=30, R=120, S=20;

  var pts=[], ga=Math.PI*(3-Math.sqrt(5));
  for(var i=0;i<N;i++){
    var y=1-(i/(N-1))*2, r=Math.sqrt(Math.max(0,1-y*y)), th=ga*i;
    pts.push(new THREE.Vector3(Math.cos(th)*r*R, y*R, Math.sin(th)*r*R));
  }
  var K=3, edges={};
  for(var a=0;a<N;a++){
    var d=pts.map(function(p,j){return [j,p.distanceTo(pts[a])];}).filter(function(x){return x[0]!==a;}).sort(function(u,v){return u[1]-v[1];});
    for(var k=0;k<K;k++){ var b=d[k][0]; edges[(a<b?a+'-'+b:b+'-'+a)]=1; }
  }

  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 3000);
  camera.position.z=430;
  var renderer=new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(2,devicePixelRatio));
  renderer.setSize(innerWidth,innerHeight);
  document.getElementById('app').appendChild(renderer.domElement);
  var dom=renderer.domElement;
  var group=new THREE.Group(); scene.add(group);

  var epos=[];
  Object.keys(edges).forEach(function(e){ var s=e.split('-'), p1=pts[+s[0]], p2=pts[+s[1]];
    epos.push(p1.x,p1.y,p1.z, p2.x,p2.y,p2.z); });
  var eg=new THREE.BufferGeometry();
  eg.setAttribute('position', new THREE.Float32BufferAttribute(epos,3));
  group.add(new THREE.LineSegments(eg, new THREE.LineBasicMaterial({color:COL.line, transparent:true, opacity:0.3})));

  var boxEdges=new THREE.EdgesGeometry(new THREE.BoxGeometry(S,S,S));
  var nodes=[];
  function numSprite(n){
    var c=document.createElement('canvas'); c.width=c.height=128;
    var x=c.getContext('2d'); x.clearRect(0,0,128,128);
    x.strokeStyle=COL.lineCss; x.lineWidth=1.4; x.lineJoin='round';
    x.font='200 66px -apple-system,Segoe UI,sans-serif';
    x.textAlign='center'; x.textBaseline='middle'; x.strokeText(String(n),64,70);
    var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c), transparent:true, depthTest:false}));
    sp.scale.set(27,27,1); return sp;
  }
  pts.forEach(function(p,i){
    var num=i+1;
    var wire=new THREE.LineSegments(boxEdges, new THREE.LineBasicMaterial({color:COL.line, transparent:true, opacity:0.85}));
    wire.position.copy(p); wire.rotation.set(i*0.7, i*1.3, i*0.4); group.add(wire);
    var sp=numSprite(num); sp.position.copy(p); group.add(sp);
    var hit=new THREE.Mesh(new THREE.BoxGeometry(S*1.7,S*1.7,S*1.7),
      new THREE.MeshBasicMaterial({transparent:true, opacity:0, depthWrite:false}));
    hit.position.copy(p);
    hit.userData={num:num, wire:wire, sp:sp, url:'https://spaces.monaverse.com/spaces/dd_emerging-realms'+String(num).padStart(2,'0')};
    group.add(hit); nodes.push(hit);
  });

  var rx=0.3, ry=0, autorot=true, dragging=false, lx=0, ly=0, downX=0, downY=0;
  var ray=new THREE.Raycaster(), mouse=new THREE.Vector2(), hover=null;
  function setHover(h){
    if(hover===h) return;
    if(hover){ hover.userData.wire.material.color.setHex(COL.line); hover.userData.wire.material.opacity=0.85; hover.userData.sp.scale.set(27,27,1); }
    hover=h;
    if(hover){ hover.userData.wire.material.color.setHex(COL.accent); hover.userData.wire.material.opacity=1; hover.userData.sp.scale.set(35,35,1); dom.style.cursor='pointer'; }
    else dom.style.cursor=dragging?'grabbing':'grab';
  }
  dom.addEventListener('pointerdown',function(e){dragging=true;autorot=false;lx=e.clientX;ly=e.clientY;downX=e.clientX;downY=e.clientY;dom.style.cursor='grabbing';});
  addEventListener('pointerup',function(e){ dragging=false; dom.style.cursor=hover?'pointer':'grab';
    if(Math.hypot(e.clientX-downX,e.clientY-downY)<6 && hover){ window.open(hover.userData.url,'_blank','noopener'); } });
  addEventListener('pointermove',function(e){
    if(dragging){ ry+=(e.clientX-lx)*0.006; rx+=(e.clientY-ly)*0.006;
      rx=Math.max(-1.4,Math.min(1.4,rx)); lx=e.clientX; ly=e.clientY; }
    mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
    ray.setFromCamera(mouse,camera); var hits=ray.intersectObjects(nodes);
    setHover(hits.length?hits[0].object:null);
  });
  addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

  function loop(){
    requestAnimationFrame(loop);
    if(autorot && !dragging) ry+=0.0015;
    group.rotation.y=ry; group.rotation.x=rx;
    renderer.render(scene,camera);
  }
  loop();
})();
</script>
</body>
</html>
