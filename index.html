<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quill VR — Jamil</title>
<style>
  :root{--bg:#f5f4f0;--surface:#ffffff;--surface2:#eeecea;--text:#1a1917;
    --muted:#8a8884;--border:#e4e2de;--accent:#c96442}
  @media (prefers-color-scheme:dark){:root{--bg:#1a1917;--surface:#242220;--surface2:#2e2c2a;
    --text:#f0eeea;--muted:#6b6965;--border:#3a3836;--accent:#d4785a}}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:clamp(2.2rem,7vh,4.5rem);padding:8vh 6vw}
  header{text-align:center}
  h1{font-size:clamp(2.2rem,7vw,3.6rem);font-weight:300;letter-spacing:-.01em;margin:0}
  h1 span{color:var(--accent)}
  .sub{margin-top:.7rem;color:var(--muted);font-size:.8rem;letter-spacing:.16em;text-transform:uppercase}
  .doors{display:flex;gap:clamp(2rem,6vw,5rem);flex-wrap:wrap;justify-content:center}
  .door{text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;
    gap:1rem;width:230px;transition:transform .3s ease}
  .door:hover{transform:translateY(-6px)}
  .vig{width:200px;height:200px;display:flex;align-items:center;justify-content:center}
  .circle{width:184px;height:184px;border-radius:50%;overflow:hidden;background:var(--surface2);
    border:0.5px solid var(--border);transition:border-color .3s,box-shadow .3s;position:relative}
  .door:hover .circle{border-color:var(--accent);box-shadow:0 14px 40px rgba(0,0,0,.14)}
  .grid9{width:100%;height:100%;display:grid;grid-template-columns:repeat(3,1fr);
    gap:7px;padding:14px;background:var(--surface)}
  .grid9 img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:50%;
    background:var(--surface2);display:block}
  .cloud{width:100%;height:100%;background:var(--bg)}
  .door h2{margin:0;font-size:1.15rem;font-weight:400;letter-spacing:.01em}
  .door p{margin:.1rem 0 0;color:var(--muted);font-size:.82rem;line-height:1.5;text-align:center}
  .go{margin-top:.5rem;font-size:.8rem;color:var(--accent);display:inline-flex;gap:.4rem;
    align-items:center;border-bottom:0.5px solid transparent;transition:.25s}
  .door:hover .go{border-color:var(--accent)}
  footer{color:var(--muted);font-size:.72rem;text-align:center;padding:1.2rem;letter-spacing:.03em}
  @media (max-width:540px){.doors{gap:2.4rem}}
</style>
</head>
